<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP: Rock Paper Scissors</title>
</head>
<body>

    <script>
        let humanScore = 0;
        let computerScore = 0;

        const results = document.createElement("div");
        document.body.appendChild(results);

        const human = document.createElement("h3");
        const computer = document.createElement("h3");

        const humanVictory = document.createElement("h4");
        const computerVictory = document.createElement("h4");


        human.textContent = `Human Score: ${humanScore}`;
        computer.textContent = `Computer Score: ${computerScore}`;

        results.appendChild(human);
        results.appendChild(computer);
        
        function updateScore() {
            human.textContent = `Human Score: ${humanScore}`;
            computer.textContent = `Computer Score: ${computerScore}`;
        }

        function checkIfGameOver() {
            if (humanScore === 5) {
                humanVictory.textContent = "Congratulations! You have won!";
                
                if (!(results.contains(humanVictory))) results.appendChild(humanVictory);
            }

            if (computerScore === 5) {
                computerVictory.textContent = "Sorry, you lost! Better luck next time :)";

                if (!results.appendChild(computerVictory)) results.appendChild(computerVictory);
)
            }
        }

        function getComputerChoice() {
            const choices = ["rock", "paper", "scissors"];
            let randomIndex = Math.floor(Math.random() * 3);
            return choices[randomIndex];
        }

        function playRound(humanChoice, computerChoice) {
            if (humanChoice === computerChoice) console.log(`Tie! ${humanChoice} is equal to ${computerChoice}`);

            else if (
                (humanChoice === "rock" && computerChoice === "scissors") ||
                (humanChoice === "paper" && computerChoice === "rock") ||
                (humanChoice === "scissors" && computerChoice === "paper")
            ) {
                console.log(`You win! ${humanChoice} beats ${computerChoice}.`);
                humanScore++;
            } 
            
            else {
                console.log(`You lose! ${computerChoice} beats ${humanChoice}.`);
                computerScore++;
            }
        }
        
        // 4 responsive buttons, using JS
        rock = document.createElement("button");
        paper = document.createElement("button");
        scissors = document.createElement("button");
        play_again = document.createElement("button");

        rock.textContent = "rock";
        rock.addEventListener('click', () => {
            playRound(rock.textContent, getComputerChoice());
            updateScore();
            checkIfGameOver();
        });

        paper.textContent = "paper";
        paper.addEventListener('click', () => {
            playRound(paper.textContent, getComputerChoice());
            updateScore();
            checkIfGameOver();
        });

        scissors.textContent = "scissors";
        scissors.addEventListener('click', () => {
            playRound(scissors.textContent, getComputerChoice());
            updateScore();
            checkIfGameOver();
        });

        play_again.textContent = "Play Again";
        play_again.addEventListener('click', () => {
            humanScore = 0;
            computerScore = 0;
            human.textContent = `Human Score: ${humanScore}`;
            computer.textContent = `Computer Score: ${computerScore}`;

            humanVictory.textContent = "";
            computerVictory.textContent = "";

            console.clear();
        })

        document.body.appendChild(rock);
        document.body.appendChild(paper);
        document.body.appendChild(scissors);
        document.body.appendChild(play_again);

    </script>
</body>
</html>
