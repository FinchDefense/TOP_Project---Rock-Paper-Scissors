<!DOCTYPE html>
<html lang="en">
<head>

    <script>
        let humanScore = 0;
        let computerScore = 0;

        function getComputerChoice() {
            let CPU_num = Math.random();
            if (CPU_num <= 0.33) return "rock";
            else if ((0.33 < CPU_num) && (CPU_num <= 0.67)) return "paper";
            else return "scissors";
        }

        function getHumanChoice() {
            let human_num = prompt("Please type rock, paper, or scissors: ");
            return human_num.toLowerCase();
        }

        function playRound(humanChoice, computerChoice) {
            if (humanChoice === computerChoice) {
                console.log("It's a tie!");
            }
            else if ((humanChoice === "paper") && (computerChoice === "rock")) {
                console.log("You win! Paper beats rock!");
                humanScore++;
            } 
            else if ((humanChoice === "paper") && (computerChoice === "scissors")) {
                console.log("You lose! Scissors beats paper!");
                computerScore++;
            }
            else if ((humanChoice === "rock") && (computerChoice === "paper")) {
                console.log("You lose! Paper beats rock!");
                computerScore++;
            }
            else if ((humanChoice === "rock") && (computerChoice === "scissors")) {
                console.log("You win! Rock beats scissors!");
                humanScore++;
            }
            else if ((humanChoice === "scissors") && (computerChoice === "paper")) {
                console.log("You win! Scissors beats paper!");
                humanScore++;
            }
            else if ((humanChoice === "scissors") && (computerChoice === "rock")) {
                console.log("You lose! Rock beats scissors!");
                computerScore++;
            }
        }

        function playGame() {
            for (let i=0; i<5; i++) {
                const humanSelection = getHumanChoice();
                const computerSelection = getComputerChoice();

                playRound(humanSelection, computerSelection);
            }

            if (humanScore > computerScore) {
                console.log("You win!!!!!!! Congratulations!")
            }
            else {
                console.log("Sorry, you lost! Better luck next time!")
            }
        }

    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP: Rock Paper Scissors</title>
</head>

</html>
